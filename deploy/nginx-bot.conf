server {
    listen 80;
    server_name _;   # Replace _ with your domain when you get one, e.g. bot.example.com

    # Webhook endpoint — proxied to gunicorn
    location /webhook {
        proxy_pass         http://127.0.0.1:8000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_connect_timeout 10s;
    }

    # Dashboard / all other routes
    location / {
        proxy_pass         http://127.0.0.1:8000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
    }

    # Static files served directly by nginx (faster)
    location /static/ {
        alias /opt/whatsapp-bot/app/static/;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # Block common scan paths
    location ~* \.(git|env|htaccess|DS_Store)$ {
        deny all;
        return 404;
    }

    access_log /var/log/nginx/whatsapp-bot-access.log;
    error_log  /var/log/nginx/whatsapp-bot-error.log;
}

