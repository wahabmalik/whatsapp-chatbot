<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="csrf-token" content="{{ csrf_token }}">
  <title>Choose new password - MALIXIS</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/dashboard.css') }}">
</head>
<body>
  <div class="auth-shell">
    <div class="auth-card panel">
      <h1>Set a new password</h1>
      <p class="auth-sub">Use at least 12 characters with upper, lower, digit, and symbol.</p>

      <form method="post" action="{{ url_for('auth.reset_password_post') }}" novalidate>
        <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
        <input type="hidden" name="token" value="{{ token }}">

        <div class="auth-field">
          <label for="password">New password</label>
          <input id="password" type="password" name="password" required autocomplete="new-password" placeholder="New strong password">
        </div>

        <button type="submit" class="button-link auth-submit">Update password</button>
      </form>
    </div>
  </div>
</body>
</html>
