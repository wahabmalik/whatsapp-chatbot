<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="csrf-token" content="{{ csrf_token }}">
  <title>Choose new password - MALIXIS</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/dashboard.css') }}">
  <style>
    .auth-shell {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: clamp(24px, 4vw, 60px) 16px;
    }
    .auth-card {
      width: min(420px, 100%);
    }
    .auth-card h1 {
      margin: 0 0 6px;
      font-size: 1.55rem;
    }
    .auth-card p.auth-sub {
      color: var(--muted);
      margin: 0 0 22px;
      font-size: 0.97rem;
    }
    .auth-field {
      display: grid;
      gap: 6px;
      margin-bottom: 14px;
    }
    .auth-field label {
      font-size: 0.88rem;
      font-weight: 600;
      color: var(--muted);
    }
    .auth-field input {
      width: 100%;
      padding: 11px 14px;
      border: 1px solid rgba(17,217,202,0.3);
      border-radius: 10px;
      color: var(--ink);
      background: rgba(3,14,24,0.84);
      font-size: 0.99rem;
    }
    .auth-field input:focus-visible {
      outline: 3px solid #5af9ee;
      outline-offset: 2px;
    }
    .auth-submit {
      width: 100%;
      margin-top: 6px;
    }
  </style>
</head>
<body>
  <div class="auth-shell">
    <div class="auth-card panel">
      <h1>Set a new password</h1>
      <p class="auth-sub">Use at least 12 characters with upper, lower, digit, and symbol.</p>

      <form method="post" action="{{ url_for('auth.reset_password_post') }}" novalidate>
        <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
        <input type="hidden" name="token" value="{{ token }}">

        <div class="auth-field">
          <label for="password">New password</label>
          <input id="password" type="password" name="password" required autocomplete="new-password" placeholder="New strong password">
        </div>

        <button type="submit" class="button-link auth-submit">Update password</button>
      </form>
    </div>
  </div>
</body>
</html>
