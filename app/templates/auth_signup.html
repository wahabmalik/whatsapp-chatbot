<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="csrf-token" content="{{ csrf_token }}">
  <title>Create account – MALIXIS</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/dashboard.css') }}">
</head>
<body>
  <div class="auth-shell">
    <a class="auth-brand" href="{{ url_for('dashboard.dashboard_home') }}" aria-label="MALIXIS home">
      <span class="brand-mark">
        <svg width="22" height="22" viewBox="0 0 22 22" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <circle cx="4" cy="11" r="3" fill="currentColor"/>
          <circle cx="18" cy="11" r="3" fill="currentColor"/>
          <path d="M7 11 Q11 3 15 11" stroke="currentColor" stroke-width="1.8" fill="none" stroke-linecap="round"/>
          <path d="M7 11 Q11 19 15 11" stroke="currentColor" stroke-width="1.8" fill="none" stroke-linecap="round" opacity="0.55"/>
        </svg>
      </span>
      <span class="brand-text">MALIXIS</span>
    </a>

    <div class="auth-card panel">
      <h1>Create your account</h1>
      <p class="auth-sub">Connect your business to customers on WhatsApp.</p>

      {% if error %}
        <p class="auth-error" role="alert">{{ error }}</p>
      {% endif %}

      <form method="post" action="{{ url_for('auth.signup') }}" novalidate>
        <input type="hidden" name="csrf_token" value="{{ csrf_token }}">

        <div class="auth-field">
          <label for="email">Email address</label>
          <input id="email" type="email" name="email" value="{{ email or '' }}" required
                 autocomplete="email" placeholder="you@example.com">
        </div>

        <div class="auth-field">
          <label for="password">Password</label>
          <input id="password" type="password" name="password" required
                 autocomplete="new-password" placeholder="Min. 12 characters, mixed case, digit and symbol">
        </div>

        <button type="submit" class="button-link auth-submit">Create account</button>
      </form>

      <div class="auth-divider">or</div>

      <div class="oauth-buttons">
        <a href="{{ url_for('auth.oauth_authorize', provider='google') }}" class="oauth-btn">
          <svg viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
          </svg>
          Sign up with Google
        </a>

        <a href="{{ url_for('auth.oauth_authorize', provider='facebook') }}" class="oauth-btn">
          <svg viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
            <path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z" fill="#1877F2"/>
          </svg>
          Sign up with Facebook
        </a>

        <a href="{{ url_for('auth.oauth_authorize', provider='linkedin') }}" class="oauth-btn">
          <svg viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
            <path d="M20.447 20.452h-3.554v-5.569c0-1.328-.475-2.236-1.986-2.236-1.081 0-1.722.731-2.004 1.438-.103.25-.129.599-.129.949v5.418h-3.555V9h3.414l.051 1.669h.048c.469-.709 1.300-1.837 3.15-1.837 2.301 0 4.025 1.504 4.025 4.738v7.882zM5.337 7.433c-1.144 0-1.915-.748-1.915-1.682 0-.953.771-1.682 1.946-1.682 1.174 0 1.915.729 1.915 1.682 0 .934-.741 1.682-1.946 1.682zm1.577 13.019H3.72V9h3.194v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.225 0z" fill="#0A66C2"/>
          </svg>
          Sign up with LinkedIn
        </a>
      </div>
    </div>

    <p class="auth-footer">Already have an account? <a href="{{ url_for('auth.login') }}">Sign in</a></p>
  </div>
</body>
</html>
