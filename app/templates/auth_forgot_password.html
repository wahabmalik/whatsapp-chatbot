<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="csrf-token" content="{{ csrf_token }}">
  <title>Reset password - MALIXIS</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/dashboard.css') }}">
</head>
<body>
  <div class="auth-shell">
    <div class="auth-card panel">
      <h1>Forgot password</h1>
      <p class="auth-sub">Enter your account email and we will send reset instructions.</p>

      <form method="post" action="{{ url_for('auth.forgot_password_post') }}" novalidate>
        <input type="hidden" name="csrf_token" value="{{ csrf_token }}">

        <div class="auth-field">
          <label for="email">Email address</label>
          <input id="email" type="email" name="email" required autocomplete="email" placeholder="you@example.com">
        </div>

        <button type="submit" class="button-link auth-submit">Send reset link</button>
      </form>
    </div>

    <p class="auth-footer"><a href="{{ url_for('auth.login') }}">Back to sign in</a></p>
  </div>
</body>
</html>
