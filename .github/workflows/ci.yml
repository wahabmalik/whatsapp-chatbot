name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: true
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Validate sprint-status YAML integrity
        run: python validate_sprint_status_integrity.py

      - name: Validate mandatory contract-test categories
        run: python validate_contract_test_categories.py

      - name: Validate story closure evidence template compatibility
        run: python validate_story_closure_evidence.py

      - name: Validate launch-gate artifact completeness
        run: python validate_launch_gate_artifact_completeness.py

      - name: Run Alembic migrations
        env:
          DATABASE_URL: sqlite:///./data/ci-saas.db
        run: python -m alembic upgrade head

      - name: Run outbound adapter parity suite (Story 9.3)
        run: python -m pytest tests/test_adapter_parity_contract.py -v --tb=short

      - name: Run cross-channel reliability gate (Instagram/Messenger)
        run: |
          python -m pytest \
            tests/test_story_2_1.py::InstagramInboundNormalizationTests \
            tests/test_story_2_1.py::MessengerInboundNormalizationTests \
            tests/test_reliability.py::InstagramWebhookE2ETests \
            tests/test_reliability.py::MessengerWebhookE2ETests \
            -v --tb=short

      - name: Run test suite
        env:
          # Pin to Meta provider so config-validation tests are deterministic
          WHATSAPP_PROVIDER: meta
          FLASK_SECRET_KEY: ci-test-secret
        run: python -m pytest tests/ -v --tb=short
